openapi: "3.0.3"
info:
  title: "Backend Service API"
  description: "Ktor backend with Auth, Products, Orders, Redis caching, RabbitMQ events"
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"
    description: "Local dev server"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRequest:
      type: object
      required: [username, passwordRaw]
      properties:
        username:
          type: string
        passwordRaw:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
    ProductDto:
      type: object
      required: [name, description, price, stock]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          type: string
        totalPrice:
          type: number
          format: double
    OrderRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: "Register a new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: "Created user token"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: "Validation failed"

  /auth/login:
    post:
      tags: [Auth]
      summary: "Login and get token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: "Successful login"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: "Invalid credentials"

  /products:
    get:
      tags: [Products]
      summary: "Get all products"
      responses:
        '200':
          description: "List of products"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags: [Products]
      summary: "Add a new product (Admin)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
      responses:
        '201':
          description: "Created product"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '403':
          description: "Forbidden - admin only"

  /products/{id}:
    get:
      tags: [Products]
      summary: "Get a specific product"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: "Product found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: "Product not found"
    put:
      tags: [Products]
      summary: "Update product (Admin)"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
      responses:
        '200':
          description: "Updated product"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      tags: [Products]
      summary: "Delete product (Admin)"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: "Deleted"

  /orders:
    post:
      tags: [Orders]
      summary: "Create an order"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: "Order created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: "Invalid stock or product"
    get:
      tags: [Orders]
      summary: "Get user's order history"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "List of orders"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{id}:
    delete:
      tags: [Orders]
      summary: "Cancel an order"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: "Cancelled"

  /stats/orders:
    get:
      tags: [Admin Stats]
      summary: "Get order stats (Admin)"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "Order statistics"
